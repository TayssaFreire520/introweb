<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imagens</title>
  </head>
  <body>
    <h1>Imagens</h1>

    <figure>
      <img
        src="../img/camisa.jpg"
        height="120"
        alt="camiseta branca"
      /><br /><br />
    </figure>

    <figure>
      <img src="../img/iphone.jpg" width="10%" alt="iphone laranja" /><br />
      <figcaption>Iphone 17 Pro Max laranja</figcaption>
    </figure>

    <figure>
      <img src="../img/hqs.jpg" width="200" loading="lazy" alt="hqs batman" />
    </figure>

    <h1>Video</h1>

    <video controls width="400">
      <source src="../video/video.mp4" type="video/mp4" />
      Seu navegador não suporta a reprodução de videos.
    </video>
    <br><br/>
    <iframe
      width="460"
      height="315"
      src="https://www.youtube.com/embed/Re7laEZVPFc?si=RCSlHMsW-uk4xBZH&amp;start=171"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
    <h1>iframe google maps</h1>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3675.086890347986!2d-43.19842673468753!3d-22.91016574210969!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x997f0c4e687185%3A0x973c7a140b9b61fa!2sEdif%C3%ADcio%20Eco%20Sapuca%C3%AD!5e0!3m2!1spt-BR!2sbr!4v1783607154892!5m2!1spt-BR!2sbr"
      width="600"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
  </body>
</html>
